services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: void_runner_backend
    # No public ports, only accessible via frontend proxy or internal network
    volumes:
      - ./server/prisma:/app/prisma
      - .env:/app/.env
    environment:
      - PRISMA_CLI_QUERY_ENGINE_TYPE=binary
      - PRISMA_CLIENT_ENGINE_TYPE=binary
      - DATABASE_URL=file:/app/prisma/dev.db
      - FRONTEND_URL=https://void.kluth.cloud
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build: .
    container_name: void_runner_frontend
    # No public ports, accessible via Traefik
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.void.rule=Host(`void.kluth.cloud`)"
      - "traefik.http.routers.void.entrypoints=websecure"
      - "traefik.http.routers.void.tls.certresolver=letsencrypt"
      - "traefik.http.services.void.loadbalancer.server.port=80"

  chroma:
    image: chromadb/chroma:latest
    container_name: void_runner_vector
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data
    restart: always

volumes:
  chroma_data:
