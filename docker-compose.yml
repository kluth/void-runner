services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: void_runner_backend
    ports:
      - "3000:3000"
    volumes:
      - ./server/prisma:/app/prisma
      - .env:/app/.env
    environment:
      - PRISMA_CLI_QUERY_ENGINE_TYPE=binary
      - PRISMA_CLIENT_ENGINE_TYPE=binary
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/config/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: .
    container_name: void_runner_frontend
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  chroma:
    image: chromadb/chroma:latest
    container_name: void_runner_vector
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data
    restart: always

volumes:
  chroma_data: