version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: void_runner_backend
    ports:
      - "3000:3000"
    volumes:
      - ./server/prisma:/app/prisma
      - .env:/app/.env
    restart: always

  frontend:
    build: .
    container_name: void_runner_frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: always

  chroma:
    image: chromadb/chroma:latest
    container_name: void_runner_vector
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data
    restart: always

volumes:
  chroma_data: